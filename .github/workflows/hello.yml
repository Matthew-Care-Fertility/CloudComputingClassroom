name: Hello World
 
on:
  push:
    branches: ["main"]
  workflow_dispatch:
 
jobs:
  greet:
    name: Say hello
    runs-on: ubuntu-latest
    steps:
      - name: Print a greeting
        run: echo "Hello from GitHub Actions!"
      - name: Print the date
        run: date
      - name: List the workspace
        run: ls -la